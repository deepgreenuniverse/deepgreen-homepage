        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const weekday = weekdays[now.getDay()];
        const daysInMonth = new Date(year, month, 0).getDate();
        const weekNumber = Math.ceil((day + now.getDay()) / 7);
        const isLeapYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        const totalDays = isLeapYear ? 366 : 365;
        const dayOfYear = Math.floor((new Date(year, month, day) - new Date(year, 1, 1)) / 86400000) + 1;
        return `${year}年${month}月${day}日 ${weekday} | 第${weekNumber}周 | 第${dayOfYear}天`;
    }

    let currentCategory = 'motivational';
    let currentSentence = '';
    
    function getRandomUniqueSentence(category, categorySentences, shownSet) {
        const available = categorySentences.filter(s => !shownSet.has(s));
        
        if (available.length === 0) {
            shownSet.clear();
            shownSentences[category] = new Set();
            available.push(...categorySentences);
        }
        
        const randomIndex = Math.floor(Math.random() * available.length);
        const selected = available[randomIndex];
        
        shownSet.add(selected);
        shownSentences[category] = shownSet;
        
        return selected;
    }
    
    function getSentence(category) {
        updateCategoryUI(category);
        currentCategory = category;
        
        const sentence = getRandomUniqueSentence(
            category, 
            sentences[category], 
            shownSentences[category]
        );
        
        displaySentence(sentence);
        currentSentence = sentence;
    }
    
    function refreshSentence() {
        const sentence = getRandomUniqueSentence(
            currentCategory, 
            sentences[currentCategory], 
            shownSentences[currentCategory]
        );
        
        displaySentence(sentence);
        currentSentence = sentence;
    }
    
    function displaySentence(sentence) {
        const sentenceEl = document.getElementById('sentence');
        sentenceEl.style.opacity = '0';
        sentenceEl.style.transform = 'translateY(10px)';
        
        setTimeout(function() {
            sentenceEl.textContent = sentence;
            sentenceEl.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            sentenceEl.style.opacity = '1';
            sentenceEl.style.transform = 'translateY(0)';
        }, 50);
    }
    
    function updateCategoryUI(category) {
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(function(btn) {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    function copySentence() {
        if (navigator.clipboard && currentSentence) {
            navigator.clipboard.writeText(currentSentence).then(function() {
                showToast('已复制到剪贴板 ✅');
            });
        } else {
            showToast('复制失败，请手动复制');
        }
    }
    
    function shareSentence() {
        if (!currentSentence) return;
        
        const shareText = currentSentence + '\n—— 来自「每日一句」DeepGreen宇宙科技';
        if (navigator.share) {
            navigator.share({ title: '每日一句', text: shareText });
        } else {
            copySentence();
            showToast('已复制，可以分享给朋友了 ✅');
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.className = 'toast';
        document.body.appendChild(toast);
        
        setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(-100px)';
            toast.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(function() { toast.remove(); }, 300);
        }, 2000);
    }
    
    getSentence('motivational');
</script>
</body>
</html>
